name: focus_flow
description: Focused study tracking for books, videos, audio, and courses.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  collection: ^1.19.1
  drift: ^2.27.0
  drift_flutter: ^0.2.5
  ffmpeg_kit_audio_flutter: ^1.1.0
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flutter_local_notifications: ^20.1.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.1
  intl: ^0.20.2
  lottie: ^3.3.2
  mime: ^2.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdfx: ^2.9.2
  permission_handler: ^12.0.1
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.5.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.4
  drift_dev: ^2.27.0
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
